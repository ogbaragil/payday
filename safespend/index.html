<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0b0b0c" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SafeSpend" />
    <script>
      // Set the theme before paint so there's no flash. Defaults to dark (the blackboard).
      try {
        document.documentElement.dataset.theme =
          localStorage.getItem("safespend-theme") || "dark";
      } catch (e) {
        document.documentElement.dataset.theme = "dark";
      }
    </script>
    <meta name="description" content="Plan each pay cycle and know how much you can safely spend before your next payday." />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- Fonts load as progressive enhancement; system fonts are used offline. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Patrick+Hand&display=swap"
      rel="stylesheet"
    />

    <title>SafeSpend</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
